<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonarHome Widget Demo - hernest.estate</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            color: #1a1a1a;
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
        }
        p {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
        }
        #sonar-iframe {
            width: 100%;
            border: none;
            transition: height 0.3s ease;
        }
        .badge {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="text-align: center;"><span class="badge">DEMO INTEGRACJI: SONARHOME</span></div>
        <h1>Wyceniarka Nieruchomości Online</h1>
        <p>Sprawdź wartość swojej nieruchomości w 2 minuty. Narzędzie zintegrowane z hernest.estate.</p>
        
        <iframe 
            id="sonar-iframe" 
            src="https://sonarhome.pl/estimate-form?apiToken=pwfadcbi5b1nxcdt7c9hgjanu8ctlo8l3tjl89rqckjzvsmjfel617t5r3gzkuhx" 
            scrolling="no">
        </iframe>
    </div>

    <script>
        window.addEventListener('message', (event) => {
            // Bezpieczeństwo: sprawdzamy źródło wiadomości
            if (event.origin !== "https://sonarhome.pl") return;
            
            const height = event.data.height;
            if (height) {
                const iframe = document.getElementById('sonar-iframe');
                iframe.style.height = height + 'px';
                console.log('Zaktualizowano wysokość iframe SonarHome:', height);
            }
        });
    </script>

</body>
</html>
